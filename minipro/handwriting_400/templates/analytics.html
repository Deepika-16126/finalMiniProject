<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body class="p-4">
    <div class="container">
      <a href="{{ url_for('index') }}" class="btn btn-link mb-3">← Back</a>
      <h1>Analytics Dashboard</h1>

      <div class="row mt-4">
        <div class="col-md-7">
          <h5>PCA Scatter</h5>
          <img src="{{ imgs.pca }}" alt="PCA" class="img-fluid mb-3">

          <h5>Classifier Summary</h5>
          <img src="{{ imgs.classifier }}" alt="Classifier results" class="img-fluid mb-3">
          <h5>Feature comparison (cluster means)</h5>
          <img src="{{ imgs.feature_compare }}" alt="Feature compare" class="img-fluid mb-3">
        </div>
        <div class="col-md-5">
          <h5>Quality Distribution</h5>
          <img src="{{ imgs.pie }}" alt="Pie" class="img-fluid mb-3">

          <h5>Recent uploads</h5>
          <ul class="list-group">
            {% for it in history[:5] %}
              <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>{{ it.filename }}</span>
                <span class="badge bg-secondary">{{ it.label }} ({{ it.confidence }}%)</span>
              </li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
